<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blurtit.lol</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 16px 80px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: #FFD700;
      letter-spacing: -0.5px;
    }

    .tagline {
      color: #555;
      font-size: 0.875rem;
      margin-top: 8px;
    }

    textarea {
      width: 100%;
      padding: 16px;
      background: #1a1a1a;
      border: 1px solid #272727;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      color: #e8e8e8;
      min-height: 88px;
      line-height: 1.55;
      transition: border-color 0.18s;
      margin-bottom: 12px;
      display: block;
    }

    textarea:focus {
      outline: none;
      border-color: #FFD700;
    }

    textarea::placeholder {
      color: #3a3a3a;
    }

    #btn-generate {
      width: 100%;
      padding: 15px 20px;
      background: #FFD700;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }

    #btn-generate:hover:not(:disabled) {
      background: #f0cb00;
    }

    #btn-generate:active:not(:disabled) {
      transform: scale(0.98);
    }

    #btn-generate:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-box {
      display: none;
      background: #1f0f0f;
      border: 1px solid #4a1f1f;
      color: #f87171;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.875rem;
      margin-top: 14px;
    }

    #error-box.show { display: block; }

    #result-section {
      display: none;
      margin-top: 28px;
      animation: fadeUp 0.3s ease;
    }

    #result-section.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #meme-img {
      width: 100%;
      border-radius: 12px;
      display: block;
      background: #1a1a1a;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-secondary {
      flex: 1;
      padding: 12px;
      background: #1a1a1a;
      color: #e8e8e8;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: #222; }

    .btn-download {
      flex: 1;
      padding: 12px;
      background: #FFD700;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-download:hover { background: #f0cb00; }

    .watermark {
      position: fixed;
      bottom: 14px;
      right: 18px;
      color: #222;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      pointer-events: none;
      user-select: none;
    }

    @media (max-width: 480px) {
      body { padding: 36px 12px 60px; }
      h1 { font-size: 1.7rem; }
      .result-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <h1>blurtit.lol</h1>
      <p class="tagline">describe your pain. we'll make a meme.</p>
    </header>

    <textarea
      id="prompt"
      rows="3"
      autocomplete="off"
      spellcheck="true"
    ></textarea>

    <button id="btn-generate" onclick="generate()">
      <span id="btn-text">Generate Meme</span>
      <div class="spinner" id="spinner" style="display:none"></div>
    </button>

    <div id="error-box"></div>

    <div id="result-section">
      <img id="meme-img" src="" alt="Generated meme" />
      <div class="result-actions">
        <button class="btn-secondary" onclick="generate()">Try Again</button>
        <button class="btn-download" onclick="downloadMeme()">Download</button>
      </div>
    </div>

  </div>

  <div class="watermark">blurtit.lol</div>

  <script>
    const examples = [
      "my manager scheduling a meeting at 5:59pm",
      "client asking for one small change",
      "me promising I'll start the project tomorrow",
      "deploying to prod on a Friday",
      "intern asking for WFH on day 1",
      "indian parents reacting to a B grade",
      "standup that could have been an email",
      "me at 11pm after 3 cups of chai",
    ];

    let exIdx = 0;
    const promptEl = document.getElementById('prompt');

    function rotatePlaceholder() {
      promptEl.placeholder = examples[exIdx % examples.length];
      exIdx++;
    }

    rotatePlaceholder();
    setInterval(rotatePlaceholder, 3000);

    let currentMemeUrl = '';

    async function generate() {
      const prompt = promptEl.value.trim();
      if (!prompt) {
        showError('Type something first.');
        return;
      }

      setLoading(true);
      clearError();
      hideResult();

      try {
        const res = await fetch('/api/meme', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || `Error ${res.status}`);
        }

        currentMemeUrl = data.meme_url;
        showMeme(data.meme_url);
      } catch (err) {
        showError(err.message || 'Meme machine broke. Try again.');
      } finally {
        setLoading(false);
      }
    }

    function downloadMeme() {
      if (!currentMemeUrl) return;
      window.location.href = '/api/download?url=' + encodeURIComponent(currentMemeUrl);
    }

    function setLoading(on) {
      const btn  = document.getElementById('btn-generate');
      const text = document.getElementById('btn-text');
      const spin = document.getElementById('spinner');
      btn.disabled       = on;
      text.textContent   = on ? 'Generating…' : 'Generate Meme';
      spin.style.display = on ? 'block' : 'none';
    }

    function showMeme(url) {
      const img = document.getElementById('meme-img');
      const sec = document.getElementById('result-section');
      img.src = url;
      img.onload = () => {
        sec.classList.add('show');
        sec.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      };
      img.onerror = () => sec.classList.add('show');
    }

    function hideResult() {
      document.getElementById('result-section').classList.remove('show');
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.classList.add('show');
    }

    function clearError() {
      document.getElementById('error-box').classList.remove('show');
    }

    promptEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate();
    });
  </script>
</body>
</html>
